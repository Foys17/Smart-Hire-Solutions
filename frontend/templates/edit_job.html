{% extends 'base.html' %}

{% block content %}
<div class="container">
    <h2>Edit Job: {{ job.title }}</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn btn-primary">Save Changes</button>
        <a href="{% url 'web_test:job_detail' job.id %}" class="btn btn-secondary">Cancel</a>
    </form>
</div>
{% endblock %}
